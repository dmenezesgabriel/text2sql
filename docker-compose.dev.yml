services:
  backend:
    volumes:
      - ./backend/src:/app/src
      - duckdb-data:/data
    command:
      ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      target: builder
    # Distinct image name so the dev (builder/Vite) image never collides with the
    # prod nginx image, which also defaults to `text2sql-frontend`. Without this,
    # compose reuses whichever was built last and the wrong stage runs.
    image: text2sql-frontend-dev
    # Vite dev server with HMR. node_modules anonymous volume prevents the host
    # bind mount from shadowing the container-installed deps.
    command: sh -c "pnpm install --prefer-offline && pnpm dev --host 0.0.0.0 --port 5173"
    ports:
      # Override the base nginx port (5173:80) with the Vite dev port.
      # Docker Compose merges ports lists, so we map 5174 on the host to avoid
      # the 5173→80 binding in the base file fighting with 5173→5173 here.
      # Access the dev frontend at http://localhost:5174 when using this override.
      - "5174:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Storybook component workshop + design-system reference. Reuses the frontend
  # builder image and source mount. Serves the addon-mcp endpoint at /mcp, which
  # the repo-root .mcp.json points Claude Code at. Browse at http://localhost:6006.
  storybook:
    build:
      context: ./frontend
      target: builder
    command: sh -c "pnpm install --prefer-offline && pnpm storybook --host 0.0.0.0 --port 6006 --no-open"
    ports:
      - "6006:6006"
    volumes:
      - ./frontend:/app
      - /app/node_modules
