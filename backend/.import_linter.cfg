[importlinter]
root_packages =
    src

[importlinter:contract:domain-entity-independence]
name = Domain entities must not import from outer layers
type = forbidden
source_modules =
    src.*.domain
forbidden_modules =
    src.*.application
    src.*.infrastructure

[importlinter:contract:application-only-depends-on-domain]
name = Application layer must not import infrastructure
type = forbidden
source_modules =
    src.*.application
forbidden_modules =
    src.*.infrastructure

[importlinter:contract:no-cyclic-imports]
name = No cyclic imports between top-level packages
type = acyclic_siblings
ancestors =
    src
