[importlinter:root_packages]
root_packages = src

[importlinter:contract:clean-architecture-layers]
name = Clean Architecture layer enforcement
type = layers
layers =
    Shared
    Domain
    Application
    Infrastructure
    Presentation
containers =
    Shared = src/shared
    Domain = src/*/domain
    Application = src/*/application
    Infrastructure = src/*/infrastructure
    Presentation = src/*/presentation

[importlinter:contract:domain-entity-independence]
name = Domain entities must not import from outer layers
type = forbid_foreign_keys
source_packages = src/*/domain
forbidden_packages =
    src/*/application
    src/*/infrastructure
    src/*/presentation

[importlinter:contract:application-only-depends-on-domain]
name = Application layer must not import infrastructure
type = forbid_foreign_keys
source_packages = src/*/application
forbidden_packages =
    src/*/infrastructure
    src/*/presentation

[importlinter:contract:no-infra-in-presentation]
name = Presentation must not import infrastructure
type = forbid_foreign_keys
source_packages = src/*/presentation
forbidden_packages = src/*/infrastructure
