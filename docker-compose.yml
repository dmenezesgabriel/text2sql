services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8090:8000"
    command: -jar DynamoDBLocal.jar -inMemory
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8000 && echo OK || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DYNAMODB_HOST=http://dynamodb-local:8000
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fake
      - AWS_DEFAULT_REGION=us-east-1
      - DUCKDB_PATH=/data/analytics.duckdb
      - LLM_MODEL=${LLM_MODEL:-gemini/gemini-2.0-flash}
      - SUMMARIZER_MODEL=${SUMMARIZER_MODEL:-gemini/gemini-2.0-flash}
      - TOKEN_LIMIT=${TOKEN_LIMIT:-100000}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET=bi-data
    volumes:
      - duckdb-data:/data
      - ${HOME}/.config/litellm/github_copilot:/root/.config/litellm/github_copilot
    depends_on:
      dynamodb-local:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  duckdb-data:
  minio-data:
