services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8090:8000"
    command: -jar DynamoDBLocal.jar -inMemory
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8000 && echo OK || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DYNAMODB_HOST=http://dynamodb-local:8000
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fake
      - AWS_DEFAULT_REGION=us-east-1
      - DUCKDB_PATH=/data/analytics.duckdb
      - LLM_MODEL=${LLM_MODEL:-gemini/gemini-2.0-flash}
      - SUMMARIZER_MODEL=${SUMMARIZER_MODEL:-gemini/gemini-2.0-flash}
      - TOKEN_LIMIT=${TOKEN_LIMIT:-100000}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET=bi-data
    volumes:
      - ./backend/src:/app/src
      - duckdb-data:/data
      - ${HOME}/.config/litellm/github_copilot:/root/.config/litellm/github_copilot
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      dynamodb-local:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      target: builder
    # Distinct image name so the dev (builder/Vite) image never collides with
    # a prod nginx image built from the same Dockerfile.
    image: text2sql-frontend-dev
    command: sh -c "pnpm install --prefer-offline && pnpm dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  # Component workshop + design-system reference. Serves the addon-mcp endpoint
  # at /mcp, which .mcp.json points Claude Code at. Browse at http://localhost:6006.
  storybook:
    build:
      context: ./frontend
      target: builder
    command: sh -c "pnpm install --prefer-offline && pnpm storybook --host 0.0.0.0 --port 6006 --no-open"
    ports:
      - "6006:6006"
    volumes:
      - ./frontend:/app
      - storybook_node_modules:/app/node_modules

volumes:
  duckdb-data:
  minio-data:
  frontend_node_modules:
  storybook_node_modules:
